name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Create redirect page
        run: |
          mkdir -p dist
          cat > dist/index.html << 'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta http-equiv="refresh" content="0;url=https://juicyjstn.github.io/pokedex-tracker/" />
              <title>Redirecting…</title>
            </head>
            <body>
              <p>This tracker has moved. <a href="https://juicyjstn.github.io/pokedex-tracker/">Click here</a> if you are not redirected automatically.</p>
              <script>window.location.replace("https://juicyjstn.github.io/pokedex-tracker/");</script>
            </body>
          </html>
          EOF

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
